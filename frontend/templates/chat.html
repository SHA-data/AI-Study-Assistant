{% extends "base.html" %}

{% block content %}
<div class="screen-container">
    <div class="chat-layout">
        <!-- Chat Main Area -->
        <div class="chat-main">
            <header class="chat-header">
                <div class="chat-header-left">
                    <div class="header-avatar">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="10" rx="2"/>
                            <circle cx="12" cy="5" r="2"/>
                            <path d="M12 7v4"/>
                            <line x1="8" y1="16" x2="8" y2="16"/>
                            <line x1="16" y1="16" x2="16" y2="16"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="chat-title display-text">My Study Buddy</h1>
                        <span class="chat-subtitle">Powered by Groq</span>
                    </div>
                </div>
                <div class="subject-tag">
                    <span id="chat-subject-name">DBMS</span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 9l6 6 6-6"/>
                    </svg>
                </div>
            </header>

            <div class="chat-thread" id="chat-thread">
                <canvas id="particle-canvas"></canvas>
                <!-- Messages will be injected here via JS -->
            </div>

            <div class="chat-input-area">
                <div class="input-container">
                    <button class="icon-btn" aria-label="Mention" disabled>@</button>
                    <button class="icon-btn" aria-label="Attach file" onclick="window.location.href='{{ url_for('upload') }}'">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                        </svg>
                    </button>
                    <input type="text" id="chat-input" placeholder="Type your message..." aria-label="Type your message">
                    <button class="btn-primary" id="send-btn">Send &gt;</button>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
